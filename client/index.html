<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Beyond Transform | HR Consultancy & Organisational Development</title>

    <meta
      name="description"
      content="Beyond Transform helps organisations unlock performance through strategic HR consulting, leadership development, youth empowerment, and transformation solutions."
    />

    <meta
      name="keywords"
      content="HR consultancy South Africa, organisational development, leadership coaching, transformation consulting, workforce development, youth empowerment, women empowerment, Beyond Transform"
    />

    <meta name="author" content="Beyond Transform" />

    <!-- Prevent duplicate indexing issues -->
    <link rel="canonical" href="https://yourdomain.co.za/" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->
    <meta property="og:title" content="Beyond Transform | HR Consultancy & Transformation" />
    <meta
      property="og:description"
      content="Strategic HR consulting, leadership development, and human-centred transformation solutions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.co.za/" />

    <!-- IMPORTANT: replace this with your real hosted image -->
    <meta property="og:image" content="https://yourdomain.co.za/og-image.png" />

    <meta property="og:site_name" content="Beyond Transform" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Beyond Transform" />
    <meta
      name="twitter:description"
      content="HR consultancy and transformation solutions focused on people, leadership, and impact."
    />
    <meta name="twitter:image" content="https://yourdomain.co.za/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
